<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>匿名通報 - OK RENT</title>
    <meta property="og:title" content="建立房客紀錄 - OK RENT">
    <meta property="og:description" content="您的身份將嚴格保密，點此開始填寫匿名通報。">
    <meta property="og:image" content="https://t19918.github.io/ok-rent-liff/monkey.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        :root { --brand-color: #8B7D6B; --brand-hover: #736758; }
        body { background-color: #f8f9fa; font-family: -apple-system, '微軟正黑體', sans-serif; }
        .form-container { background-color: white; border-radius: 15px; padding: 25px; margin: 20px auto; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .brand-text { color: var(--brand-color); font-weight: bold; }
        .highlight-alert { color: #dc3545; font-size: 0.85rem; font-weight: bold; margin-top: 5px;}
        .section-title { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; margin-bottom: 15px; font-weight: bold; color: #333; }
        
        /* 標籤按鈕樣式 */
        .btn-outline-brand { color: var(--brand-color); border-color: var(--brand-color); margin-bottom: 8px; margin-right: 5px; border-radius: 20px;}
        .btn-check:checked + .btn-outline-brand { background-color: var(--brand-color); color: white; border-color: var(--brand-color);}
        
        /* 自訂動態標籤樣式 */
        .custom-tag {
            display: inline-flex;
            align-items: center;
            background-color: #e9ecef;
            color: #495057;
            padding: 5px 12px;
            border-radius: 20px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            border: 1px solid #dee2e6;
        }
        .custom-tag .btn-close-tag {
            margin-left: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #adb5bd;
        }
        .custom-tag .btn-close-tag:hover { color: #dc3545; }

        .btn-submit { background-color: var(--brand-color); color: white; border: none; font-weight: bold; padding: 15px; border-radius: 10px; font-size: 1.1rem;}
        .btn-submit:hover { background-color: var(--brand-hover); color: white; }
        #userInfo { font-size: 0.85rem; color: #198754; text-align: center; margin-top: 15px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="form-container">
        <div class="text-center mb-4">
            <h3 class="brand-text">建立房客紀錄</h3>
            <p class="highlight-alert">您的身份將嚴格保密，對外不顯示。</p>
        </div>

        <form id="reportForm">
            <div class="section-title">📋 核心資料 (必填)</div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">租客手機號碼 <span class="text-danger">*</span></label>
                <input type="tel" class="form-control" id="tenantPhone" placeholder="請輸入 09 開頭的完整號碼" pattern="[0-9]*" required inputmode="numeric">
                <div class="highlight-alert">租客身份資料將嚴格保密。</div>
            </div>

            <div class="mb-3 mt-4">
                <label class="form-label fw-bold">通報類型 (可複選) <span class="text-danger">*</span></label><br>
                
                <input type="checkbox" class="btn-check tag-checkbox" id="tag1" value="租金問題"><label class="btn btn-outline-brand btn-sm" for="tag1">💰 租金問題</label>
                <input type="checkbox" class="btn-check tag-checkbox" id="tag2" value="房屋損壞"><label class="btn btn-outline-brand btn-sm" for="tag2">🏚️ 房屋損壞</label>
                <input type="checkbox" class="btn-check tag-checkbox" id="tag3" value="違反租約"><label class="btn btn-outline-brand btn-sm" for="tag3">📝 違反租約</label>
                <input type="checkbox" class="btn-check tag-checkbox" id="tag4" value="行為失當"><label class="btn btn-outline-brand btn-sm" for="tag4">🫨 行為失當</label>
                <input type="checkbox" class="btn-check tag-checkbox" id="tag5" value="退租問題"><label class="btn btn-outline-brand btn-sm" for="tag5">📃 退租問題</label>
                <input type="checkbox" class="btn-check tag-checkbox" id="tag6" value="法律糾紛"><label class="btn btn-outline-brand btn-sm" for="tag6">🚔 法律糾紛</label>
                <input type="checkbox" class="btn-check tag-checkbox" id="tag7" value="詐欺行為"><label class="btn btn-outline-brand btn-sm" for="tag7">🤬 詐欺行為</label>
                <input type="checkbox" class="btn-check tag-checkbox" id="tag8" value="環境問題"><label class="btn btn-outline-brand btn-sm" for="tag8">🗑️ 環境問題</label>
                <input type="checkbox" class="btn-check" id="tagOtherTrigger"><label class="btn btn-outline-brand btn-sm" for="tagOtherTrigger">其他 (自定義)</label>
                
                <div id="customTagsDisplay" class="mt-2"></div>

                <div id="otherInputContainer" class="mt-2 shadow-sm p-3 border rounded bg-light" style="display: none;">
                    <label class="form-label small fw-bold">新增自定義標籤：</label>
                    <div class="input-group">
                        <input type="text" class="form-control form-control-sm" id="customTagInput" placeholder="例如：養寵物、半夜噪音">
                        <button class="btn btn-dark btn-sm" type="button" id="btnAddCustomTag">新增</button>
                    </div>
                    <div class="form-text small text-muted">輸入完按「新增」或 Enter 鍵。</div>
                </div>
                
                <div class="highlight-alert mt-2">以上標籤係根據房東個人之意見回報，不代表本平台對事實之最終認定。選取 [ 🚔 法律糾紛 ] 則需上傳佐證資料。</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">發生年份 <span class="text-danger">*</span></label>
                <select class="form-select" id="happenYear" required>
                    <option value="" selected disabled>請選擇發生年份</option>
                    </select>
            </div>

            <div class="section-title">📝 詳細描述</div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">事件簡述 <span class="text-danger">*</span></label>
                <textarea class="form-control" id="eventDesc" rows="4" placeholder="請簡述經過 (限 200 字內)" maxlength="200" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">上傳佐證資料 (強烈鼓勵)</label>
                <input class="form-control" type="file" id="evidenceFiles" multiple accept="image/*,application/pdf">
                <div class="highlight-alert mt-2">有附圖的紀錄權重較高。請務必遮蔽個資，僅保留關鍵證據。</div>
            </div>

            <div class="form-check mt-4 mb-4 p-3 bg-light border border-danger rounded">
                <input class="form-check-input ms-1" type="checkbox" id="legalCheck" required>
                <label class="form-check-label ms-2 fw-bold text-danger" for="legalCheck"> [ 必勾 ] 我鄭重聲明：通報內容皆屬實，並承擔相關法律責任。</label>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-submit btn-lg" id="submitBtn">🚀 確認送出，建立匿名紀錄</button>
            </div>
        </form>
        <div id="userInfo">🔐 正在安全連線中...</div>
    </div>
</div>

<script>
    // ⚠️ 請務必替換為你的 LIFF ID
    const MY_LIFF_ID = "2009841191-yODfj8ZB"; 

    let customTagsList = [];

    document.addEventListener("DOMContentLoaded", () => {
        generateYears();
        setupCustomTagsLogic();
        initLIFF();
    });

    // 1. 產生年份選單 (今年 -> 1980)
    function generateYears() {
        const yearSelect = document.getElementById('happenYear');
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= 1980; y--) {
            yearSelect.options.add(new Option(y + " 年", y));
        }
    }

    // 2. 處理自定義標籤邏輯
    function setupCustomTagsLogic() {
        const trigger = document.getElementById('tagOtherTrigger');
        const container = document.getElementById('otherInputContainer');
        const input = document.getElementById('customTagInput');
        const btnAdd = document.getElementById('btnAddCustomTag');

        // 切換輸入框顯示
        trigger.addEventListener('change', function() {
            container.style.display = this.checked ? 'block' : 'none';
        });

        // 點擊新增按鈕
        btnAdd.addEventListener('click', addTag);

        // 按下 Enter 鍵新增
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTag();
            }
        });

        function addTag() {
            const val = input.value.trim();
            if (val && !customTagsList.includes(val)) {
                customTagsList.push(val);
                renderCustomTags();
                input.value = '';
            }
        }
    }

    // 渲染動態標籤
    function renderCustomTags() {
        const display = document.getElementById('customTagsDisplay');
        display.innerHTML = '';
        customTagsList.forEach((tag, index) => {
            const span = document.createElement('span');
            span.className = 'custom-tag';
            span.innerHTML = `${tag} <span class="btn-close-tag" onclick="removeTag(${index})">✕</span>`;
            display.appendChild(span);
        });
    }

    // 移除標籤
    window.removeTag = function(index) {
        customTagsList.splice(index, 1);
        renderCustomTags();
    };

    async function initLIFF() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById('userInfo').innerHTML = `🛡️ 房東驗證成功：${profile.displayName}`;
            }
        } catch (err) {
            console.error('LIFF Error:', err);
        }
    }

    document.getElementById('reportForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const checkedTags = Array.from(document.querySelectorAll('.tag-checkbox:checked')).map(cb => cb.value);
        const allTags = [...checkedTags, ...customTagsList];

        if(allTags.length === 0) {
            alert('請至少選擇或新增一項通報類型！');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "資料建檔中...";
        btn.disabled = true;

        const phone = document.getElementById('tenantPhone').value;
        const year = document.getElementById('happenYear').value;
        const tagsString = allTags.join('、');

        try {
            if (liff.isInClient()) {
                await liff.sendMessages([{
                    'type': 'text',
                    'text': `【系統通知】收到匿名通報\n\n對象：${phone}\n年份：${year}年\n類型：${tagsString}\n\n感謝您的回報，紀錄已建立。`
                }]);
                liff.closeWindow();
            } else {
                alert('模擬送出成功！標籤包含：' + tagsString);
                btn.disabled = false;
                btn.innerText = "🚀 確認送出，建立匿名紀錄";
            }
        } catch (err) {
            alert('傳送失敗');
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
